<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Getinkvision</title>

<style>
body{margin:0;font-family:'Segoe UI';background:#eef2f7;}
header{background:#203a43;color:#fff;padding:10px;display:flex;justify-content:space-between;}
.login-box{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;justify-content:center;align-items:center;}
.login-form{background:#fff;padding:25px;border-radius:10px;text-align:center;}
.btn{padding:8px 15px;margin-top:10px;cursor:pointer;}
</style>

</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="login">
<div class="login-form">
<h3>Login with Email OTP</h3>

<input type="email" id="email" placeholder="Enter Email"><br>

<button class="btn" onclick="sendOTP()">Send OTP</button>

<div id="otpBox" style="display:none;">
<input type="text" id="otpInput" placeholder="Enter OTP"><br>
<button class="btn" onclick="verifyOTP()">Verify</button>
</div>

</div>
</div>

<header>
<h2>Getinkvision</h2>
</header>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

// ✅ INIT WITH YOUR PUBLIC KEY
emailjs.init("kN_PRsWCW-Xm3KsSe");

let generatedOTP = "";

// 🔹 SEND OTP
function sendOTP(){

let email = document.getElementById("email").value;

if(!email){
alert("Enter Email");
return;
}

// generate OTP
generatedOTP = Math.floor(100000 + Math.random()*900000);

// SEND EMAIL
emailjs.send("service_xi5uzyv","template_nslwd65",{
    to_email: email,
    otp: generatedOTP
})
.then(function(response){
    alert("OTP sent successfully!");
    document.getElementById("otpBox").style.display="block";
},
function(error){
    console.log(error);
    alert("Failed to send OTP");
});

}

// 🔹 VERIFY OTP
function verifyOTP(){

let userOTP = document.getElementById("otpInput").value;

if(userOTP == generatedOTP){
    alert("Login Successful!");
    document.getElementById("login").style.display="none";
}else{
    alert("Wrong OTP");
}

}

</script>

</body>
</html>
