<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Getinkvision Store</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f1f3f6;
}

/* HEADER */
header{
background:#2874f0;
color:#fff;
padding:12px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

header input{
width:40%;
padding:10px;
border:none;
border-radius:5px;
}

header button{
padding:10px 15px;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

/* NAVBAR */
nav{
background:#fff;
padding:12px;
display:flex;
justify-content:center;
gap:40px;
font-weight:bold;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

nav div{
cursor:pointer;
}

/* BANNER */
.banner{
height:260px;
background:url('https://images.unsplash.com/photo-1581578731548-c64695cc6952?auto=format&fit=crop&w=1200&q=80') center/cover;
display:flex;
align-items:center;
justify-content:center;
font-size:35px;
font-weight:bold;
color:white;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#fff;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

.price{
font-size:20px;
color:green;
font-weight:bold;
}

.btn{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.add{
background:#ff9f00;
color:white;
}

.buy{
background:#fb641b;
color:white;
}

/* CART */
.cart{
position:fixed;
right:0;
top:0;
width:340px;
height:100%;
background:#fff;
box-shadow:-3px 0 10px rgba(0,0,0,0.2);
padding:15px;
overflow:auto;
display:none;
z-index:999;
}

.cart-item{
display:flex;
align-items:center;
margin-bottom:12px;
border-bottom:1px solid #ddd;
padding-bottom:10px;
}

.cart-item img{
width:60px;
height:60px;
object-fit:cover;
margin-right:10px;
border-radius:5px;
}

/* ADDRESS FORM */
.address-box{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

.address-form{
background:white;
padding:25px;
border-radius:10px;
width:320px;
text-align:center;
}

.address-form input,
.address-form textarea{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

.address-form button{
margin-top:15px;
width:100%;
padding:10px;
background:#2874f0;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

/* LOGIN */
.login-box{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
justify-content:center;
align-items:center;
z-index:2000;
}

.login-form{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
width:300px;
}

.login-form input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

.login-form button{
margin-top:15px;
padding:10px;
width:100%;
background:#2874f0;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

/* FOOTER */
footer{
background:#2874f0;
color:white;
text-align:center;
padding:15px;
margin-top:20px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="loginBox">

<div class="login-form">

<h2>Login With OTP</h2>

<input type="text" id="mobile" placeholder="Enter Mobile Number">

<button onclick="sendOTP()">Send OTP</button>

<div id="otpSection" style="display:none;">

<input type="text" id="otp" placeholder="Enter OTP">

<button onclick="verifyOTP()">Verify OTP</button>

</div>

</div>

</div>

<!-- HEADER -->
<header>

<h2>Getinkvision</h2>

<input type="text" placeholder="Search products...">

<button onclick="toggleCart()">
Cart (<span id="cart-count">0</span>)
</button>

</header>

<!-- NAV -->
<nav>

<div onclick="filterProducts('all')">All Products</div>

<div onclick="filterProducts('Floor Cleaner')">Floor Cleaner</div>

<div onclick="filterProducts('Toilet Cleaner')">Toilet Cleaner</div>

<div onclick="filterProducts('Degreaser')">Degreaser</div>

<div onclick="filterProducts('Hand Wash')">Hand Wash</div>

</nav>

<!-- BANNER -->
<div class="banner">
Welcome To Getinkvision Store
</div>

<!-- PRODUCTS -->
<section class="products" id="products">

<div class="card" data-name="Floor Cleaner">

<img src="https://images.unsplash.com/photo-1606813902912-dcf0c03b5e44?auto=format&fit=crop&w=600&q=80">

<h3>Floor Cleaner</h3>

<p class="price">₹120</p>

<button class="btn add" onclick="addToCart('Floor Cleaner',120,this)">
Add To Cart
</button>

</div>

<div class="card" data-name="Toilet Cleaner">

<img src="https://images.unsplash.com/photo-1581579185169-7e0c6e7c8b6c?auto=format&fit=crop&w=600&q=80">

<h3>Toilet Cleaner</h3>

<p class="price">₹90</p>

<button class="btn add" onclick="addToCart('Toilet Cleaner',90,this)">
Add To Cart
</button>

</div>

<div class="card" data-name="Degreaser">

<img src="https://images.unsplash.com/photo-1581091215367-59ab6b89e5f8?auto=format&fit=crop&w=600&q=80">

<h3>Degreaser</h3>

<p class="price">₹150</p>

<button class="btn add" onclick="addToCart('Degreaser',150,this)">
Add To Cart
</button>

</div>

<div class="card" data-name="Hand Wash">

<img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?auto=format&fit=crop&w=600&q=80">

<h3>Hand Wash</h3>

<p class="price">₹70</p>

<button class="btn add" onclick="addToCart('Hand Wash',70,this)">
Add To Cart
</button>

</div>

</section>

<!-- CART -->
<div class="cart" id="cart">

<h2>Your Cart</h2>

<div id="cart-items"></div>

<h3>Total: ₹<span id="total">0</span></h3>

<button class="btn buy" onclick="openAddress()">
Place Order
</button>

</div>

<!-- ADDRESS -->
<div class="address-box" id="addressBox">

<div class="address-form">

<h2>Delivery Details</h2>

<input type="text" id="name" placeholder="Full Name">

<input type="text" id="phone" placeholder="Phone Number">

<textarea id="address" rows="4" placeholder="Full Address"></textarea>

<button onclick="placeOrder()">
Confirm Order
</button>

</div>

</div>

<footer>
© 2026 Getinkvision Store
</footer>

<script>

let generatedOTP = "";
let loggedIn = false;

let cart = [];

/* OTP SYSTEM */
function sendOTP(){

let mobile = document.getElementById("mobile").value;

if(mobile.length != 10){

alert("Enter valid mobile number");
return;

}

generatedOTP = Math.floor(100000 + Math.random() * 900000);

alert("Demo OTP: " + generatedOTP);

document.getElementById("otpSection").style.display = "block";

}

function verifyOTP(){

let otp = document.getElementById("otp").value;

if(otp == generatedOTP){

loggedIn = true;

document.getElementById("loginBox").style.display = "none";

alert("Login Successful");

}else{

alert("Wrong OTP");

}

}

/* FILTER PRODUCTS */
function filterProducts(name){

if(!loggedIn){

alert("Please login first");
return;

}

let cards = document.querySelectorAll(".card");

cards.forEach(card=>{

if(name == "all"){

card.style.display = "block";

}else{

card.style.display =
(card.dataset.name == name)
? "block"
: "none";

}

});

}

/* ADD TO CART */
function addToCart(name, price, btn){

if(!loggedIn){

alert("Please login first");
return;

}

let img = btn.parentElement.querySelector("img").src;

let existing = cart.find(item => item.name == name);

if(existing){

existing.qty++;

}else{

cart.push({
name:name,
price:price,
qty:1,
img:img
});

}

updateCart();

}

/* UPDATE CART */
function updateCart(){

let cartItems = document.getElementById("cart-items");

cartItems.innerHTML = "";

let total = 0;

let count = 0;

cart.forEach(item=>{

cartItems.innerHTML += `

<div class="cart-item">

<img src="${item.img}">

<div>

<b>${item.name}</b><br>

Qty: ${item.qty}<br>

₹${item.price * item.qty}

</div>

</div>

`;

total += item.price * item.qty;

count += item.qty;

});

document.getElementById("total").innerText = total;

document.getElementById("cart-count").innerText = count;

}

/* TOGGLE CART */
function toggleCart(){

if(!loggedIn){

alert("Please login first");
return;

}

let cartBox = document.getElementById("cart");

if(cartBox.style.display == "block"){

cartBox.style.display = "none";

}else{

cartBox.style.display = "block";

}

}

/* OPEN ADDRESS */
function openAddress(){

if(cart.length == 0){

alert("Cart is empty");
return;

}

document.getElementById("addressBox").style.display = "flex";

}

/* PLACE ORDER */
function placeOrder(){

let name = document.getElementById("name").value;

let phone = document.getElementById("phone").value;

let address = document.getElementById("address").value;

if(name == "" || phone == "" || address == ""){

alert("Please fill all details");
return;

}

let productDetails = "";

cart.forEach(item=>{

productDetails +=
`${item.name} x${item.qty} = ₹${item.price * item.qty}\n`;

});

let total = document.getElementById("total").innerText;

alert(

"ORDER SUCCESSFUL ✅\n\n" +

"Customer Details:\n" +
"----------------------\n" +

"Name: " + name + "\n" +

"Phone: " + phone + "\n" +

"Address: " + address + "\n\n" +

"Ordered Products:\n" +
"----------------------\n" +

productDetails +

"\nTotal Amount: ₹" + total +

"\n\nThank You For Shopping!"

);

cart = [];

updateCart();

document.getElementById("addressBox").style.display = "none";

document.getElementById("cart").style.display = "none";

document.getElementById("name").value = "";

document.getElementById("phone").value = "";

document.getElementById("address").value = "";

}

</script>

</body>
</html>
