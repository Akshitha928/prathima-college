<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    transition:0.3s;
}

/* THEMES */
body.light{
    background:#f2f2f2;
}

body.dark{
    background:#121212;
}

/* Calculator */
.calculator{
    padding:20px;
    border-radius:10px;
    width:320px;
    transition:0.3s;
}

body.light .calculator{
    background:#fff;
}

body.dark .calculator{
    background:#1e1e1e;
}

/* Display */
#display{
    width:100%;
    height:60px;
    font-size:24px;
    margin-bottom:15px;
    padding:10px;
    text-align:right;
    border:none;
    border-radius:5px;
}

body.light #display{
    background:#eee;
    color:#000;
}

body.dark #display{
    background:#333;
    color:#fff;
}

/* Buttons Grid */
.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    transition:0.2s;
}

/* Light Mode Buttons */
body.light button{
    background:#ddd;
    color:#000;
}

body.light button:hover{
    background:#bbb;
}

/* Dark Mode Buttons */
body.dark button{
    background:#444;
    color:#fff;
}

body.dark button:hover{
    background:#666;
}

/* Special Buttons */
.equal{
    background:#28a745 !important;
    color:#fff;
}

.clear{
    background:#dc3545 !important;
    color:#fff;
}

.back{
    background:#ff9800 !important;
    color:#fff;
}

/* Theme Toggle */
.toggle{
    margin-bottom:10px;
    text-align:right;
}

.toggle button{
    padding:5px 10px;
    font-size:14px;
}
</style>
</head>

<body class="light">

<div class="calculator">

    <div class="toggle">
        <button onclick="toggleTheme()">🌙 Toggle</button>
    </div>

    <input type="text" id="display" disabled>

    <div class="buttons">
        <button class="clear">C</button>
        <button class="back">⌫</button>
        <button>/</button>
        <button>*</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>-</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>+</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="equal">=</button>

        <button>0</button>
        <button>.</button>
    </div>
</div>

<script>
let display = document.getElementById("display");
let buttons = document.querySelectorAll("button");

let currentInput = "";

/* Button Clicks */
buttons.forEach(button => {
    button.addEventListener("click", () => {
        let value = button.innerText;

        if(value === "C"){
            currentInput = "";
        }
        else if(value === "="){
            try{
                currentInput = eval(currentInput).toString();
            }catch{
                currentInput = "Error";
            }
        }
        else if(value === "⌫"){
            currentInput = currentInput.slice(0, -1);
        }
        else if(value !== "🌙 Toggle"){
            currentInput += value;
        }

        display.value = currentInput;
    });
});

/* Theme Toggle */
function toggleTheme(){
    document.body.classList.toggle("dark");
    document.body.classList.toggle("light");
}

/* Keyboard Support */
document.addEventListener("keydown", (e) => {
    if((e.key >= "0" && e.key <= "9") || "+-*/.".includes(e.key)){
        currentInput += e.key;
    }
    else if(e.key === "Enter"){
        try{
            currentInput = eval(currentInput).toString();
        }catch{
            currentInput = "Error";
        }
    }
    else if(e.key === "Backspace"){
        currentInput = currentInput.slice(0, -1);
    }
    else if(e.key === "Escape"){
        currentInput = "";
    }

    display.value = currentInput;
});
</script>

</body>
</html>
